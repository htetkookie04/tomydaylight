<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>For My Love 💜</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    height: 100dvh;
    overflow: hidden;
    font-family: 'Quicksand', sans-serif;
    background: #0a0520;
    color: #fff;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* ---------- Matrix canvas ---------- */
  #matrix {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: block;
  }

  /* ---------- Floating hearts ---------- */
  .heart {
    position: fixed;
    bottom: -40px;
    font-size: 24px;
    color: #7c3aed;
    animation: floatUp linear forwards;
    z-index: 2;
    pointer-events: none;
    text-shadow: 0 0 12px #7c3aed;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) scale(0.6); opacity: 0; }
    15%  { opacity: 1; }
    100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
  }

  /* ---------- Intro overlay ---------- */
  #intro {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    padding: 60px 20px;
    pointer-events: none;
    transition: opacity 1s ease;
  }
  #intro-top {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(24px, 4vw, 40px);
    color: #c4b5fd;
    text-shadow: 0 0 16px #7c3aed;
    text-align: center;
  }
  #startBtn {
    pointer-events: auto;
    padding: 14px 40px;
    font-size: 18px;
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    color: #fff;
    background: linear-gradient(135deg, #7c3aed, #4c1d95);
    border: none;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(124,58,237,0.7);
    transition: transform 0.2s;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  #startBtn.show { opacity: 1; transform: translateY(0); }
  #startBtn:hover { transform: scale(1.06); }

  /* ---------- Main stage ---------- */
  #stage {
    position: fixed;
    inset: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.2s ease;
  }
  #stage.show { opacity: 1; pointer-events: auto; }

  #title {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(34px, 6vw, 72px);
    color: #fff;
    text-shadow: 0 0 20px #7c3aed, 0 0 40px #7c3aed;
    margin-bottom: 6px;
    text-align: center;
  }
  #subtitle {
    font-size: clamp(12px, 1.6vw, 16px);
    color: #c4b5fd;
    margin-bottom: 24px;
    letter-spacing: 3px;
    text-align: center;
  }

  /* ---------- Photo album book ---------- */
  .book {
    position: relative;
    /* fit by both width and height so landscape/short screens still work */
    width: min(86vw, 360px, calc(50vh * 3 / 4));
    aspect-ratio: 3/4;
    perspective: 2200px;
    margin-top: 6px;
  }
  /* Book base: gives the stack a solid back so it looks like a closed album */
  .book::before {
    content: '';
    position: absolute;
    inset: -10px -8px -14px -6px;
    background: linear-gradient(135deg, #1a0a3d, #2e1065);
    border-radius: 6px 22px 22px 6px;
    box-shadow:
      0 30px 70px rgba(0,0,0,0.7),
      inset 0 0 40px rgba(124,58,237,0.15);
    z-index: -1;
  }
  .page {
    position: absolute;
    inset: 0;
    transform-origin: left center;
    transform-style: preserve-3d;
    transition: transform 1.1s cubic-bezier(0.55, 0.08, 0.25, 1);
    border-radius: 4px 18px 18px 4px;
    will-change: transform;
  }
  .page.flipped { transform: rotateY(-178deg); }
  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background-size: cover;
    background-position: center;
    border-radius: inherit;
    box-shadow:
      0 20px 60px rgba(124,58,237,0.35),
      inset 14px 0 30px rgba(0,0,0,0.45),
      0 0 0 3px rgba(124,58,237,0.28);
  }
  .face.back {
    transform: rotateY(180deg);
    border-radius: 18px 4px 4px 18px;
    background-image: none !important;
    background: radial-gradient(circle at center, #1f0a3d 0%, #0a0420 70%, #0d020a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(80px, 16vw, 140px);
    color: #7c3aed;
    text-shadow:
      0 0 20px #7c3aed,
      0 0 40px #7c3aed,
      0 0 80px #5b21b6;
    box-shadow:
      0 20px 60px rgba(124,58,237,0.35),
      inset -14px 0 30px rgba(0,0,0,0.55),
      0 0 0 3px rgba(124,58,237,0.28);
    animation: heartPulse 1.8s ease-in-out infinite;
  }
  @keyframes heartPulse {
    0%, 100% { filter: drop-shadow(0 0 10px #7c3aed); }
    50%      { filter: drop-shadow(0 0 30px #7c3aed); }
  }
  /* Cover page: dark with title */
  .page.cover .face.front {
    background: linear-gradient(135deg, #0f0428 0%, #1e0a4a 50%, #3d1565 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #c4b5fd;
    text-align: center;
    padding: 20px;
  }
  .page.cover .face.front .cover-title {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(28px, 6vw, 44px);
    color: #fff;
    text-shadow: 0 0 20px #7c3aed;
    margin-bottom: 12px;
  }
  .page.cover .face.front .cover-sub {
    font-size: 13px;
    letter-spacing: 3px;
    opacity: 0.8;
  }
  .page.cover .face.front .cover-heart {
    font-size: 40px;
    margin: 18px 0;
    filter: drop-shadow(0 0 12px #7c3aed);
  }

  /* ---------- Message ---------- */
  #message {
    margin-top: 24px;
    max-width: min(90vw, 520px);
    text-align: center;
    font-size: clamp(15px, 2vw, 20px);
    line-height: 1.7;
    color: #ede9fe;
    padding: 0 10px;
  }
  #message .line {
    display: block;
    opacity: 0;
    transform: translateY(10px);
    animation: lineIn 0.8s ease forwards;
  }
  #message .line:nth-child(2) { animation-delay: 0.6s; }
  #message .line:nth-child(3) { animation-delay: 1.2s; }
  @keyframes lineIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Music button ---------- */
  #musicBtn {
    position: fixed;
    bottom: 90px;
    right: 28px;
    width: 74px;
    height: 74px;
    border-radius: 50%;
    background: radial-gradient(circle at 32% 30%, #0f0528 0%, #050005 70%, #000 100%);
    border: 1px solid rgba(124,58,237,0.4);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    z-index: 15;
    box-shadow:
      0 0 35px rgba(124,58,237,0.55),
      0 0 80px rgba(124,58,237,0.35),
      inset 0 0 20px rgba(124,58,237,0.25);
    animation: musicGlow 2.4s ease-in-out infinite;
    transition: transform 0.2s;
  }
  #musicBtn:hover { transform: scale(1.06); }
  #musicBtn .ic {
    font-size: 26px;
    line-height: 1;
    filter: drop-shadow(0 0 6px #7c3aed);
  }
  @keyframes musicGlow {
    0%, 100% {
      box-shadow:
        0 0 35px rgba(124,58,237,0.55),
        0 0 80px rgba(124,58,237,0.35),
        inset 0 0 20px rgba(124,58,237,0.25);
    }
    50% {
      box-shadow:
        0 0 55px rgba(124,58,237,0.85),
        0 0 120px rgba(124,58,237,0.55),
        inset 0 0 25px rgba(124,58,237,0.35);
    }
  }
  #musicBtn .orbit {
    position: absolute;
    inset: -14px;
    pointer-events: none;
    animation: orbit 4s linear infinite;
  }
  #musicBtn .orbit .dot {
    position: absolute;
    top: 50%;
    right: 0;
    width: 9px;
    height: 9px;
    margin-top: -4px;
    margin-right: -4px;
    background: #fff;
    border-radius: 50%;
    box-shadow:
      0 0 10px #fff,
      0 0 20px #7c3aed,
      0 0 30px #5b21b6;
  }
  @keyframes orbit {
    to { transform: rotate(360deg); }
  }
  #musicBtn.paused .ic-pause { display: none; }
  #musicBtn:not(.paused) .ic-play { display: none; }

  /* song label that fades in briefly */
  #nowPlaying {
    position: fixed;
    bottom: 100px;
    right: 115px;
    font-size: 12px;
    letter-spacing: 2px;
    color: #c4b5fd;
    text-shadow: 0 0 10px #7c3aed;
    text-align: right;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease;
    z-index: 15;
    font-family: 'Quicksand', sans-serif;
  }
  #nowPlaying.show { opacity: 1; }
  #nowPlaying .t { font-family: 'Dancing Script', cursive; font-size: 18px; color: #fff; display: block; }

  /* ---------- Controls ---------- */
  #controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    gap: 12px;
    z-index: 10;
  }
  #controls.show { display: flex; }
  .btn {
    background: rgba(124,58,237,0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(124,58,237,0.4);
    color: #fff;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 14px;
    font-family: 'Quicksand', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover {
    background: rgba(124,58,237,0.35);
    border-color: #7c3aed;
  }

  /* ============================================================
     RESPONSIVE
     ============================================================ */

  /* Tablet and below */
  @media (max-width: 900px) {
    #stage { justify-content: flex-start; padding-top: 8vh; }
  }

  /* Phones */
  @media (max-width: 640px) {
    #intro { padding: 40px 16px; }
    #intro-top { font-size: clamp(20px, 5.5vw, 30px); }
    #startBtn { padding: 12px 30px; font-size: 16px; }

    #stage { padding: 14px 12px; padding-top: 6vh; }
    #title { font-size: clamp(30px, 9vw, 46px); margin-bottom: 2px; }
    #subtitle { font-size: 11px; letter-spacing: 2px; margin-bottom: 14px; }

    .book {
      width: min(72vw, 260px, calc(46vh * 3 / 4));
      margin-top: 0;
    }
    .page.cover .face.front .cover-title { font-size: clamp(24px, 7vw, 34px); }
    .page.cover .face.front .cover-heart  { font-size: 32px; margin: 10px 0; }
    .page.cover .face.front .cover-sub    { font-size: 11px; }
    .face.back { font-size: clamp(56px, 18vw, 90px); }

    #message {
      margin-top: 16px;
      font-size: 13.5px;
      line-height: 1.55;
    }

    #musicBtn {
      width: 58px; height: 58px;
      bottom: 72px; right: 16px;
    }
    #musicBtn .ic { font-size: 20px; }
    #musicBtn .orbit { inset: -10px; }
    #musicBtn .orbit .dot { width: 7px; height: 7px; }

    #nowPlaying {
      bottom: 78px;
      right: 86px;
      font-size: 10px;
      letter-spacing: 1.5px;
    }
    #nowPlaying .t { font-size: 14px; }

    #controls { bottom: 14px; gap: 8px; }
    .btn { padding: 8px 14px; font-size: 12px; }
  }

  /* Very small phones */
  @media (max-width: 380px) {
    .book { width: min(70vw, 220px, calc(44vh * 3 / 4)); }
    #message { font-size: 12.5px; }
    #title { font-size: 28px; }
    #musicBtn { width: 52px; height: 52px; bottom: 66px; right: 12px; }
    #musicBtn .ic { font-size: 18px; }
  }

  /* Short screens — landscape phones or small laptops */
  @media (max-height: 640px) {
    #stage { justify-content: flex-start; padding-top: 14px; }
    #title { font-size: clamp(24px, 5vw, 36px); margin-bottom: 0; }
    #subtitle { margin-bottom: 8px; font-size: 10px; }
    .book {
      width: min(40vh, 86vw, 260px);
      margin-top: 0;
    }
    #message { margin-top: 10px; font-size: 12.5px; line-height: 1.45; }
    #message .line:nth-child(3) { display: none; }
    #controls { bottom: 10px; }
    #musicBtn { bottom: 58px; width: 54px; height: 54px; }
    #nowPlaying { bottom: 66px; right: 78px; }
  }
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="intro">
  <div id="intro-top">A little surprise for you...</div>
  <button id="startBtn">Open my heart 💜</button>
</div>

<div id="stage">
  <div id="title">For You, My Love</div>
  <div id="subtitle">— EVERY MOMENT WITH YOU —</div>
  <div class="book" id="book"></div>
  <div id="message">
    <span class="line">In every photo, I see a thousand reasons I love you.</span>
    <span class="line">You are my favorite hello and my hardest goodbye.</span>
    <span class="line">Forever yours 💜</span>
  </div>
</div>

<audio id="bgm" src="taylor_swift_daylight_lyrics_mp3_10146.mp3" loop preload="auto"></audio>

<button id="musicBtn" class="paused" style="display:none;" aria-label="Play music">
  <span class="ic ic-play">▶</span>
  <span class="ic ic-pause">❚❚</span>
  <span class="orbit"><span class="dot"></span></span>
</button>
<div id="nowPlaying">
  <span class="t">Daylight</span>
  <span>TAYLOR SWIFT</span>
</div>

<script>
/* ===============================================================
   MATRIX FALLING RAIN + TEXT REVEAL
   Each column has its own falling head; trails fade behind them.
   A hidden mask canvas marks cells where the target text lives,
   and those cells are redrawn every frame as bright glowing
   characters so the shape stays visible while rain keeps flowing.
   =============================================================== */

const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
const phrases = ['LOVE YOU ', 'MISS YOU '];
const charPool = 'LOVEYOUMISSYOU';

let cellW = 14, cellH = 18;
let cols = 0, rows = 0;
let drops = [];          // head position (in cell units, float) per column
let speeds = [];         // fall speed per column
let colPhrases = [];     // which phrase this column is streaming
let colOffsets = [];     // phase offset so columns don't line up
let maskChars = [];      // stable characters painted inside the mask shape

// hidden mask canvas: one pixel per grid cell
const mask = document.createElement('canvas');
const mctx = mask.getContext('2d', { willReadFrequently: true });
let maskData = null;
let currentText = '';
let transitionStart = -9999;
const TRANSITION_MS = 450;

function randChar() {
  return charPool[(Math.random() * charPool.length) | 0];
}

function phraseChar(x, row) {
  const p = colPhrases[x];
  const idx = ((row + colOffsets[x]) % p.length + p.length) % p.length;
  return p[idx];
}

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // adapt cell size to viewport — smaller cells on phones so the
  // masked word shape has enough resolution to stay readable
  cellW = Math.max(9, Math.min(18, Math.floor(window.innerWidth / 45)));
  cellH = Math.round(cellW * 1.3);

  cols = Math.ceil(window.innerWidth / cellW);
  rows = Math.ceil(window.innerHeight / cellH);

  drops      = new Array(cols);
  speeds     = new Array(cols);
  colPhrases = new Array(cols);
  colOffsets = new Array(cols);
  for (let x = 0; x < cols; x++) {
    drops[x]      = Math.random() * -rows;
    speeds[x]     = 0.25 + Math.random() * 0.55;
    colPhrases[x] = phrases[(Math.random() * phrases.length) | 0];
    colOffsets[x] = (Math.random() * 20) | 0;
  }

  mask.width = cols;
  mask.height = rows;
  maskChars = new Array(cols * rows);
  for (let i = 0; i < maskChars.length; i++) maskChars[i] = randChar();

  // clear the canvas background so no old frames remain
  ctx.fillStyle = '#0a0520';
  ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

  if (currentText) setMask(currentText);
}
window.addEventListener('resize', resize);

function setMask(text) {
  currentText = text;
  transitionStart = performance.now();
  mctx.clearRect(0, 0, cols, rows);
  if (!text) { maskData = null; return; }

  mctx.fillStyle = '#fff';
  mctx.textAlign = 'center';
  mctx.textBaseline = 'middle';

  // size text to roughly half the viewport height, while fitting
  // horizontally. Arial Black glyph advance ≈ 0.58 × fontSize, so we
  // divide the available width by that ratio instead of assuming
  // one cell per character (which was making phone text unreadably small).
  const maxByHeight = rows * 0.48;
  const maxByWidth  = (cols * 0.92) / (Math.max(text.length, 1) * 0.58);
  const fontSize = Math.max(8, Math.min(maxByHeight, maxByWidth));

  mctx.font = `900 ${fontSize}px "Arial Black", Impact, sans-serif`;
  mctx.fillText(text, cols / 2, rows / 2);

  maskData = mctx.getImageData(0, 0, cols, rows).data;
}

function draw() {
  // fade previous frame → leaves a trailing streak behind each head
  ctx.fillStyle = 'rgba(10, 5, 32, 0.09)';
  ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

  ctx.font = `bold ${cellH - 3}px "Courier New", monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // ---- 1. falling rain heads — each column streams its phrase ----
  ctx.shadowBlur = 0;
  for (let x = 0; x < cols; x++) {
    const y = Math.floor(drops[x]);
    if (y >= 0 && y < rows) {
      // dim trailing char just above the head (prev phrase char)
      if (y - 1 >= 0) {
        ctx.fillStyle = '#2e1065';
        ctx.fillText(phraseChar(x, y - 1), x * cellW + cellW / 2, (y - 1) * cellH + cellH / 2);
      }
      // bright falling head (current phrase char)
      ctx.fillStyle = '#ddd6fe';
      ctx.fillText(phraseChar(x, y), x * cellW + cellW / 2, y * cellH + cellH / 2);
    }

    drops[x] += speeds[x];
    if (drops[x] * cellH > window.innerHeight && Math.random() > 0.975) {
      drops[x]      = Math.random() * -12;
      speeds[x]     = 0.25 + Math.random() * 0.55;
      colPhrases[x] = phrases[(Math.random() * phrases.length) | 0];
      colOffsets[x] = (Math.random() * 20) | 0;
    }
  }

  // ---- 2. text shape overlay with switch animation ----
  if (maskData) {
    const elapsed = performance.now() - transitionStart;
    const tRaw = Math.min(1, Math.max(0, elapsed / TRANSITION_MS));
    // ease-out cubic
    const t = 1 - Math.pow(1 - tRaw, 3);

    // shuffle faster during transition for a glitch/reveal feel
    const shuffleRate = tRaw < 1 ? 0.35 : 0.04;
    for (let i = 0; i < maskChars.length; i++) {
      if (Math.random() < shuffleRate) maskChars[i] = randChar();
    }

    // scale + fade the mask in from the center
    const cx = (cols * cellW) / 2;
    const cy = (rows * cellH) / 2;
    const scale = 0.6 + 0.4 * t;

    ctx.save();
    ctx.globalAlpha = t;
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    ctx.translate(-cx, -cy);

    ctx.fillStyle = '#9333ea';
    ctx.shadowColor = '#5b21b6';
    ctx.shadowBlur = 8 + (1 - t) * 20;

    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        if (maskData[(y * cols + x) * 4 + 3] > 80) {
          ctx.fillText(
            maskChars[y * cols + x],
            x * cellW + cellW / 2,
            y * cellH + cellH / 2
          );
        }
      }
    }
    ctx.restore();
    ctx.shadowBlur = 0;
  }

  requestAnimationFrame(draw);
}

resize();
draw();

/* ===============================================================
   INTRO SEQUENCE: 3 → 2 → 1 → LOVE → button
   =============================================================== */
const sequence = ['3', '2', '1', 'READY', "I'M", 'TRUELY', 'LOVE', 'YOU'];
let seqIdx = 0;
setMask(sequence[0]);

const seqTimer = setInterval(() => {
  seqIdx++;
  if (seqIdx < sequence.length) {
    setMask(sequence[seqIdx]);
  } else {
    clearInterval(seqTimer);
    document.getElementById('startBtn').classList.add('show');
  }
}, 1300);

/* ===============================================================
   FLOATING HEARTS
   =============================================================== */
function spawnHeart() {
  const h = document.createElement('div');
  h.className = 'heart';
  h.textContent = '💜';
  h.style.left = Math.random() * 100 + 'vw';
  h.style.fontSize = (16 + Math.random() * 22) + 'px';
  const dur = 5 + Math.random() * 5;
  h.style.animationDuration = dur + 's';
  document.body.appendChild(h);
  setTimeout(() => h.remove(), dur * 1000);
}
setInterval(spawnHeart, 400);

/* ===============================================================
   REVEAL STAGE ON BUTTON CLICK
   =============================================================== */
const intro = document.getElementById('intro');
const stage = document.getElementById('stage');

document.getElementById('startBtn').addEventListener('click', () => {
  intro.style.opacity = '0';
  // start music on user gesture (browser autoplay rules)
  playMusic();
  setTimeout(() => {
    intro.style.display = 'none';
    // fade matrix text to just the heart shape or clear it for rain look
    setMask('♥');
    stage.classList.add('show');
    document.getElementById('musicBtn').style.display = 'flex';
    const np = document.getElementById('nowPlaying');
    np.classList.add('show');
    setTimeout(() => np.classList.remove('show'), 4500);
  }, 900);
});

/* ===============================================================
   MUSIC PLAYER — Taylor Swift "Daylight"
   Drop daylight.mp3 in the same folder as this HTML file.
   =============================================================== */
const bgm = document.getElementById('bgm');
const musicBtn = document.getElementById('musicBtn');
bgm.volume = 0.7;

function playMusic() {
  bgm.play().then(() => {
    musicBtn.classList.remove('paused');
  }).catch(() => {
    // autoplay blocked — stays paused, user can click the button
    musicBtn.classList.add('paused');
  });
}
function pauseMusic() {
  bgm.pause();
  musicBtn.classList.add('paused');
}
musicBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  if (bgm.paused) playMusic();
  else pauseMusic();
});

/* ===============================================================
   PHOTO ALBUM BOOK
   Each photo is a page that flips from right to left on its
   left binding. A cover page sits on top of the stack.
   =============================================================== */
const book = document.getElementById('book');
const imgs = ['1.jpg','2.jpg','3.jpg','4.jpg','5.jpg','6.jpg','7.jpg','8.jpg','9.jpg','10.jpg'];

// build: cover page + one page per photo
const pages = [];

// cover
const cover = document.createElement('div');
cover.className = 'page cover';
cover.innerHTML = `
  <div class="face front">
    <div class="cover-title">Our Story</div>
    <div class="cover-heart">💜</div>
    <div class="cover-sub">TAP TO OPEN</div>
  </div>
  <div class="face back">💜</div>
`;
book.appendChild(cover);
pages.push(cover);

// photo pages: front = photo, back = glowing heart decoration
for (let i = 0; i < imgs.length; i++) {
  const p = document.createElement('div');
  p.className = 'page';
  const front = document.createElement('div');
  front.className = 'face front';
  front.style.backgroundImage = `url("${imgs[i]}")`;
  const back = document.createElement('div');
  back.className = 'face back';
  back.textContent = '💜';
  p.appendChild(front);
  p.appendChild(back);
  book.appendChild(p);
  pages.push(p);
}

// initial stack: earlier pages render on top
pages.forEach((p, i) => { p.style.zIndex = pages.length - i; });

let current = 0;          // how many pages have been flipped
let zCounter = 1000;      // bumped on every flip so latest stays on top
let closing = false;      // guard while the book is auto-closing

function next() {
  if (closing) return;
  if (current >= pages.length - 1) {
    closeBook();
    return;
  }
  const p = pages[current];
  p.classList.add('flipped');
  p.style.zIndex = ++zCounter;
  current++;
}

function prev() {
  if (closing) return;
  if (current <= 0) return;
  current--;
  const p = pages[current];
  p.classList.remove('flipped');
  p.style.zIndex = ++zCounter;
}

function closeBook() {
  closing = true;
  // unflip from the top of the left stack downward with a slight stagger
  // so the book visibly closes page by page
  const stagger = 90;
  for (let i = pages.length - 1; i >= 0; i--) {
    const p = pages[i];
    const delay = (pages.length - 1 - i) * stagger;
    setTimeout(() => {
      p.classList.remove('flipped');
      p.style.zIndex = ++zCounter;
    }, delay);
  }
  // once animation finishes, allow interaction again
  const total = (pages.length - 1) * stagger + 1150;
  setTimeout(() => {
    current = 0;
    closing = false;
  }, total);
}

// also allow clicking the book itself to flip forward
book.addEventListener('click', next);
</script>
